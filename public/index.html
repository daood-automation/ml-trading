<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ML Trading — Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-950:#0A1628; --navy-900:#101E36; --navy-800:#152845; --navy-700:#1E3357;
    --accent:#3E7BFA; --accent-600:#2563EB; --accent-50:#EEF3FF;
    --canvas:#FAFBFC; --card:#FFFFFF; --muted-surface:#F1F5F9; --hover:#F8FAFC;
    --text:#0A1628; --text-2:#5A6478; --text-3:#94A3B8; --inverse:#FFFFFF;
    --border-subtle:#F1F5F9; --border:#E5E7EB; --border-strong:#CBD5E1;
    --radius-sm:6px; --radius-md:8px; --radius-lg:12px; --radius-xl:16px;
    --shadow-xs:0 1px 2px rgba(10,22,40,.04);
    --shadow-sm:0 1px 2px rgba(10,22,40,.04),0 2px 4px rgba(10,22,40,.04);
    --shadow-md:0 1px 2px rgba(10,22,40,.04),0 8px 24px rgba(10,22,40,.06);
    --shadow-lg:0 4px 6px rgba(10,22,40,.05),0 20px 40px rgba(10,22,40,.10);
    --shadow-focus:0 0 0 3px rgba(62,123,250,.15);
    --ease:cubic-bezier(.4,0,.2,1);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--canvas);color:var(--text);
    font-family:"Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  a:hover{color:var(--accent-600)}
  button{font-family:inherit;font-size:15px;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:15px}
  h1,h2,h3{margin:0;font-weight:600;letter-spacing:-.02em;color:var(--text)}
  h1{font-size:28px;line-height:1.2}
  h2{font-size:24px;line-height:1.25}
  h3{font-size:18px;letter-spacing:-.01em;line-height:1.35}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .muted{color:var(--text-2)}
  .faint{color:var(--text-3)}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:5px}

  /* shell */
  .shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .side{background:var(--navy-950);padding:22px 14px;display:flex;flex-direction:column;gap:3px}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 10px 22px}
  .brand svg{flex-shrink:0}
  .brand b{font-size:15px;letter-spacing:.02em;color:#fff;font-weight:600}
  .brand span{font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:rgba(255,255,255,.4)}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nav button{background:none;border:none;color:rgba(255,255,255,.7);text-align:left;
    padding:10px 12px;border-radius:8px;display:flex;align-items:center;gap:10px;font-weight:500;
    transition:.15s var(--ease);border-left:3px solid transparent}
  .nav button:hover{background:var(--navy-900);color:rgba(255,255,255,.95)}
  .nav button.on{background:var(--navy-900);color:#fff;border-left-color:var(--accent)}
  .side .foot{margin-top:auto;padding:12px 10px 4px;border-top:1px solid rgba(255,255,255,.08);
    font-size:13px;color:rgba(255,255,255,.55)}
  .side .foot b{color:#fff;font-weight:600;display:block;margin-bottom:1px}
  .main{padding:30px 40px;overflow:auto;max-height:100vh}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}

  /* buttons */
  .btn{background:var(--navy-950);color:#fff;border:none;font-weight:500;
    padding:0 16px;height:40px;border-radius:var(--radius-sm);transition:.15s var(--ease);
    display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn:hover{background:var(--navy-900)}
  .btn.accent{background:var(--accent)}
  .btn.accent:hover{background:var(--accent-600)}
  .btn.ghost{background:var(--card);border:1px solid var(--border);color:var(--text)}
  .btn.ghost:hover{background:var(--muted-surface)}
  .btn.sm{height:32px;padding:0 12px;font-size:13px}
  .btn:focus-visible{outline:none;box-shadow:var(--shadow-focus)}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* cards + tables */
  .card{background:var(--card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);
    box-shadow:var(--shadow-md);padding:24px}
  .grid{display:grid;gap:20px}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:13px;font-weight:500;letter-spacing:.02em;color:var(--text-2);
    padding:10px 12px;border-bottom:1px solid var(--border)}
  td{padding:13px 12px;border-bottom:1px solid var(--border-subtle);color:var(--text)}
  tr.row{cursor:pointer;transition:.12s var(--ease)}
  tr.row:hover td{background:var(--hover)}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
  .field label{font-size:13px;color:var(--text-2);font-weight:500;letter-spacing:.02em}
  .field input,.field select,.field textarea{background:var(--card);border:1px solid var(--border);
    color:var(--text);padding:0 14px;height:44px;border-radius:var(--radius-sm);width:100%;transition:.15s var(--ease)}
  .field textarea{height:auto;padding:11px 14px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:var(--shadow-focus)}
  .field input::placeholder{color:var(--text-3)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  /* status badges — icon + text chip (Alternative E) */
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;
    font-size:13px;font-weight:500;white-space:nowrap;line-height:1}
  .pill svg{width:13px;height:13px}
  .s-grey{color:var(--text-2);background:var(--muted-surface)}
  .s-amber{color:#B45309;background:#FEF3C7}
  .s-blue{color:#1E40AF;background:#DBEAFE}
  .s-green{color:#047857;background:#D1FAE5}
  .s-red{color:#B91C1C;background:#FEE2E2}
  .s-cyan{color:#0369A1;background:#E0F2FE}
  .s-indigo{color:#4338CA;background:#E0E7FF}
  .s-violet{color:#6D28D9;background:#EDE9FE}

  /* order state track */
  .track{display:flex;gap:0;margin:6px 0 10px}
  .track .step{flex:1;text-align:center;position:relative;padding-top:24px;font-size:12px;color:var(--text-3);font-weight:500}
  .track .step::before{content:"";position:absolute;top:6px;left:50%;width:12px;height:12px;
    border-radius:50%;background:var(--border-strong);transform:translateX(-50%);z-index:2;border:2px solid var(--card)}
  .track .step::after{content:"";position:absolute;top:11px;left:-50%;width:100%;height:2px;background:var(--border);z-index:1}
  .track .step:first-child::after{display:none}
  .track .step.done{color:var(--text)}
  .track .step.done::before{background:var(--accent)}
  .track .step.done::after{background:var(--accent)}
  .track .step.cur::before{background:var(--accent);box-shadow:0 0 0 4px var(--accent-50)}
  .track .step.cur{color:var(--accent)}

  /* auth split layout */
  .auth{display:grid;grid-template-columns:45% 55%;min-height:100vh}
  .auth-left{background:
    radial-gradient(120% 100% at 0% 0%, rgba(21,40,69,.55) 0%, rgba(10,22,40,0) 55%),
    var(--navy-950);
    color:#fff;padding:48px;display:flex;flex-direction:column;position:relative}
  .auth-brand{display:flex;align-items:center;gap:11px}
  .auth-brand b{font-size:17px;font-weight:600;letter-spacing:.01em}
  .auth-hero{margin:auto 0;max-width:400px}
  .auth-hero h2{color:#fff;font-size:30px;letter-spacing:-.03em;margin-bottom:12px}
  .auth-hero p{color:rgba(255,255,255,.7);font-size:16px;line-height:1.55;margin:0 0 34px}
  .auth-illu{opacity:.95}
  .auth-foot{font-size:12px;font-weight:500;color:rgba(255,255,255,.4)}
  .auth-right{background:var(--canvas);display:flex;align-items:center;justify-content:center;padding:40px}
  .auth-card{width:100%;max-width:420px;box-shadow:var(--shadow-lg)}
  .auth-hero-mobile{display:none}

  .err{color:var(--danger,#B91C1C);color:#DC2626;font-size:13px;margin-top:10px;min-height:18px}
  .ok{color:#047857;font-size:13px}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--navy-950);color:#fff;
    padding:12px 18px;border-radius:var(--radius-md);box-shadow:var(--shadow-lg);
    opacity:0;transform:translateY(8px);transition:.2s var(--ease);max-width:340px;font-size:14px}
  .toast.show{opacity:1;transform:none}
  .toast.bad{background:#B91C1C}
  .empty{text-align:center;padding:54px 20px;color:var(--text-3)}
  .linkbox{background:var(--muted-surface);border:1px dashed var(--border-strong);border-radius:var(--radius-md);
    padding:11px;font-family:var(--mono);font-size:12px;word-break:break-all;color:var(--accent-600)}

  @media(max-width:1024px){
    .auth{grid-template-columns:1fr}
    .auth-left{padding:32px 24px;min-height:auto;flex-direction:row;align-items:center;justify-content:center}
    .auth-hero,.auth-foot,.auth-illu{display:none}
    .auth-hero-mobile{display:block;text-align:center;color:#fff}
    .auth-hero-mobile h3{color:#fff;margin-top:8px}
    .auth-hero-mobile p{color:rgba(255,255,255,.7);font-size:14px;margin:4px 0 0}
    .auth-right{padding:0 20px 40px;align-items:flex-start}
    .auth-card{margin-top:-24px}
  }
  @media(max-width:720px){
    .shell{grid-template-columns:1fr}.side{display:none}.main{padding:18px}
    .row2{grid-template-columns:1fr}
  }
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
  .kpi{background:var(--card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:18px 20px}
  .kpi .l{font-size:13px;color:var(--text-2);font-weight:500;display:flex;align-items:center;gap:7px}
  .kpi .l svg{width:15px;height:15px;color:var(--text-3)}
  .kpi .v{font-size:26px;font-weight:600;letter-spacing:-.02em;margin-top:7px;font-variant-numeric:tabular-nums}
  .kpi .s{font-size:12px;color:var(--text-3);margin-top:3px}
  .attn{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-subtle)}
  .attn:last-child{border-bottom:none}
  .brk{display:flex;align-items:center;justify-content:space-between;padding:9px 0}
  @media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
const $ = (id)=>document.getElementById(id);
const app = $("app");
let STATE = { user:null };

/* ---------- helpers ---------- */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function money(n){ return "£"+Number(n||0).toFixed(2); }
function toast(msg,bad){ const t=$("toast"); t.textContent=msg; t.className="toast show"+(bad?" bad":""); setTimeout(()=>t.className="toast",2600); }
async function api(path,opts={}){
  const res = await fetch(path,{credentials:"include",headers:{"Content-Type":"application/json"},...opts});
  let data=null; try{ data=await res.json(); }catch(e){}
  if(!res.ok){ const err=new Error((data&&data.error)||("http_"+res.status)); err.data=data; err.status=res.status; throw err; }
  return data;
}

/* ---------- status label + colour maps ---------- */
const PAY_LABEL={awaiting_payment:"Awaiting payment",review_pending:"Review pending",cash_pending:"Cash pending",partial_verified:"Partial verified",full_verified:"Paid in full",not_found:"Not found",needs_clarification:"Needs clarification",cancelled:"Cancelled"};
const PAY_COLOR={awaiting_payment:"s-grey",review_pending:"s-amber",cash_pending:"s-amber",partial_verified:"s-blue",full_verified:"s-green",not_found:"s-red",needs_clarification:"s-amber",cancelled:"s-red"};
const FUL_LABEL={not_released:"Not released",ready_to_pack:"Ready to pack",packed:"Packed",dispatched:"Dispatched",delivered:"Delivered",collected:"Collected",issue_hold:"On hold",cancelled:"Cancelled"};
const FUL_COLOR={not_released:"s-grey",ready_to_pack:"s-cyan",packed:"s-indigo",dispatched:"s-violet",delivered:"s-green",collected:"s-green",issue_hold:"s-red",cancelled:"s-red"};
const SVG=(inner)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;
const ICONS={
  check:'<path d="M20 6 9 17l-5-5"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 2"/>',
  truck:'<path d="M3 5h11v10H3z"/><path d="M14 8h4l3 3v4h-7z"/><circle cx="6.5" cy="17.5" r="1.6"/><circle cx="17.5" cy="17.5" r="1.6"/>',
  package:'<path d="M12 2 3 7v10l9 5 9-5V7z"/><path d="M3 7l9 5 9-5"/><path d="M12 12v10"/>',
  alert:'<circle cx="12" cy="12" r="9"/><path d="M12 8v4.5"/><path d="M12 16h.01"/>',
  x:'<circle cx="12" cy="12" r="9"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>',
  circle:'<circle cx="12" cy="12" r="9"/>',
  percent:'<path d="M19 5 5 19"/><circle cx="6.5" cy="6.5" r="2.4"/><circle cx="17.5" cy="17.5" r="2.4"/>'
};
const STATUS_ICON={
  awaiting_payment:'circle',review_pending:'clock',cash_pending:'clock',partial_verified:'percent',
  full_verified:'check',not_found:'alert',needs_clarification:'clock',cancelled:'x',
  not_released:'circle',ready_to_pack:'clock',packed:'package',dispatched:'truck',
  delivered:'check',collected:'check',issue_hold:'alert'
};
function pill(map,cmap,v){ return `<span class="pill ${cmap[v]||"s-grey"}">${SVG(ICONS[STATUS_ICON[v]]||ICONS.circle)}${esc(map[v]||v)}</span>`; }

/* brand mark (monoline warehouse + peak) + wordmark */
const MARK=`<svg width="30" height="30" viewBox="0 0 32 32" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 27V13l12-8 12 8v14"/><path d="M4 27h24"/><path d="M11 27v-7h10v7"/><path d="M16 5l5 5"/></svg>`;
const MARK_ACCENT=`<svg width="30" height="30" viewBox="0 0 32 32" fill="none" stroke="var(--accent)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 27V13l12-8 12 8v14"/><path d="M4 27h24"/><path d="M11 27v-7h10v7"/></svg>`;

/* auth-panel monoline duotone illustration: abstract logistics — stacked
   crates, a routing path, and network nodes. Accent blue + white low-opacity. */
const ILLU=`<svg width="290" height="200" viewBox="0 0 290 200" fill="none">
  <g stroke="#fff" stroke-opacity=".22" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="26" y="120" width="60" height="52" rx="3"/><path d="M26 138h60M56 120v52"/>
    <rect x="92" y="132" width="46" height="40" rx="3"/><path d="M92 152h46M115 132v40"/>
  </g>
  <g stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M40 96l30-18 30 18v34l-30 18-30-18z" fill="rgba(62,123,250,.10)"/>
    <path d="M40 96l30 18 30-18M70 114v34"/>
  </g>
  <g stroke="#fff" stroke-opacity=".5" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="1 7">
    <path d="M118 70C170 60 176 118 232 108"/>
  </g>
  <g fill="var(--accent)"><circle cx="118" cy="70" r="4.5"/><circle cx="232" cy="108" r="4.5"/></g>
  <g stroke="#fff" stroke-opacity=".22" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M214 150h44l10 12v18h-54z"/><path d="M258 150v12h10"/>
    <circle cx="226" cy="184" r="5"/><circle cx="252" cy="184" r="5"/>
  </g>
  <g stroke="var(--accent)" stroke-opacity=".8" stroke-width="1.5"><path d="M204 52h34M221 40v24" stroke-linecap="round"/></g>
</svg>`;

function authShell(inner){
  return `<div class="auth">
    <div class="auth-left">
      <div class="auth-brand">${MARK}<b>ML Trading</b></div>
      <div class="auth-hero">
        <h2>Operations that scale.</h2>
        <p>The complete B2B operations platform for modern distributors.</p>
        <div class="auth-illu">${ILLU}</div>
      </div>
      <div class="auth-hero-mobile">${MARK}<h3>ML Trading</h3><p>Operations that scale.</p></div>
      <div class="auth-foot">© 2026 ML Trading International Ltd</div>
    </div>
    <div class="auth-right"><div class="auth-card card">${inner}</div></div>
  </div>`;
}

const ROLE_LABEL={owner:"Owner",finance_manager:"Finance Manager",finance_team:"Finance",shipping_manager:"Shipping Manager",shipping_team:"Shipping",reseller:"Reseller"};
const isStaff=()=>STATE.user&&STATE.user.role!=="reseller";
const isFinance=()=>["owner","finance_manager","finance_team"].includes(STATE.user?.role);
const isShipping=()=>["owner","shipping_manager","shipping_team"].includes(STATE.user?.role);
const canManage=()=>["owner","finance_manager","shipping_manager"].includes(STATE.user?.role);

/* ---------- boot ---------- */
async function boot(){
  const params=new URLSearchParams(location.search);
  const setup=params.get("setup");
  if(setup){ return renderSetup(setup); }
  try{ const me=await api("/api/app/me"); STATE.user=me.user; renderApp(defaultView()); }
  catch(e){ renderLogin(); }
}

/* ---------- login ---------- */
function renderLogin(){
  app.innerHTML=authShell(`
      <div class="eyebrow">Welcome back</div>
      <h2 style="margin-bottom:5px">Sign in to your account</h2>
      <p class="muted" style="margin:0 0 22px">Enter your credentials to continue.</p>
      <div class="field"><label>Email</label><input id="email" type="email" autocomplete="username" placeholder="you@company.com"/></div>
      <div class="field"><label>Password</label><input id="pw" type="password" autocomplete="current-password" placeholder="••••••••"/></div>
      <button class="btn accent" style="width:100%" id="go">Sign in</button>
      <div class="err" id="err"></div>`);
  const go=async()=>{
    $("err").textContent="";
    try{ const r=await api("/api/auth/login",{method:"POST",body:JSON.stringify({email:$("email").value.trim(),password:$("pw").value})});
      STATE.user=r.user; renderApp(defaultView()); }
    catch(e){ $("err").textContent=loginErr(e.message); }
  };
  $("go").onclick=go;
  $("pw").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
}
function loginErr(m){ return {invalid_credentials:"Email or password is incorrect.",account_locked:"Too many attempts. Try again in 15 minutes.",account_inactive:"This account is inactive.",password_setup_required:"You need to set your password first — use your setup link."}[m]||"Could not sign in."; }

/* ---------- set password ---------- */
function renderSetup(token){
  app.innerHTML=authShell(`
      <div class="eyebrow">Get started</div>
      <h2 style="margin-bottom:5px">Set your password</h2>
      <p class="muted" style="margin:0 0 22px">Choose a password to activate your account.</p>
      <div class="field"><label>New password (min 8 characters)</label><input id="pw" type="password" placeholder="••••••••"/></div>
      <div class="field"><label>Confirm password</label><input id="pw2" type="password" placeholder="••••••••"/></div>
      <button class="btn accent" style="width:100%" id="go">Set password</button>
      <div class="err" id="err"></div>`);
  $("go").onclick=async()=>{
    $("err").textContent="";
    if($("pw").value.length<8){ $("err").textContent="Password must be at least 8 characters."; return; }
    if($("pw").value!==$("pw2").value){ $("err").textContent="Passwords do not match."; return; }
    try{ await api("/api/auth/set-password",{method:"POST",body:JSON.stringify({token,password:$("pw").value})});
      history.replaceState({},"","/"); renderLogin(); toast("Password set — sign in now.");
    }catch(e){ $("err").textContent=e.message==="invalid_or_expired_token"?"This setup link is invalid or has expired.":"Could not set password."; }
  };
}

/* ---------- app shell ---------- */
function navItems(){
  const items=[];
  if(isStaff()) items.push({k:"dashboard",label:"Dashboard"});
  items.push({k:"orders",label:"Orders"});
  if(STATE.user.role==="reseller") items.push({k:"new",label:"New order"});
  if(isShipping()) items.push({k:"queue",label:"Shipping queue"});
  if(canManage()) items.push({k:"products",label:"Products"});
  if(["owner","finance_manager"].includes(STATE.user.role)) items.push({k:"resellers",label:"Resellers"});
  return items;
}
function defaultView(){ return isStaff()?"dashboard":"orders"; }
function renderApp(view){
  const u=STATE.user;
  app.innerHTML=`<div class="shell">
    <aside class="side">
      <div class="brand">${MARK}<b>ML Trading</b></div>
      <nav class="nav" id="nav">${navItems().map(i=>`<button data-k="${i.k}" class="${i.k===view?"on":""}">${esc(i.label)}</button>`).join("")}</nav>
      <div class="foot"><b>${esc(u.name)}</b><br/>${esc(ROLE_LABEL[u.role]||u.role)}<br/>
        <button class="btn ghost sm" style="margin-top:10px" id="logout">Sign out</button></div>
    </aside>
    <main class="main" id="main"></main>
  </div>`;
  $("nav").querySelectorAll("button").forEach(b=>b.onclick=()=>renderApp(b.dataset.k));
  $("logout").onclick=async()=>{ await api("/api/auth/logout",{method:"POST"}); STATE.user=null; renderLogin(); };

    ["Dispatched",["dispatched","delivered"].includes(o.fulfilmentStatus)],

function renderActions(box,o,d,id){
  let html="";
  if(isFinance() && ["awaiting_payment","review_pending","cash_pending","partial_verified","needs_clarification"].includes(o.paymentStatus)){
    html+=`<div class="card"><h3 style="margin-bottom:12px">Payment review</h3>
      <div class="field"><label>Result</label><select id="pr_result">
        <option value="full_verified">Paid in full</option>
        <option value="partial_verified">Partial payment verified</option>
        <option value="not_found">Payment not found</option>
        <option value="needs_clarification">Needs clarification</option></select></div>
      <div class="field"><label>Amount verified (£)</label><input id="pr_amt" type="number" step="0.01" value="${Number(o.orderTotal).toFixed(2)}"/></div>
      <div class="field"><label>Bank reference</label><input id="pr_ref"/></div>
      <div class="field" id="pr_partialwrap" style="display:none">
        <label><input type="checkbox" id="pr_partial" style="width:auto;margin-right:6px"/>Approve partial release (exception)</label></div>
      <button class="btn" id="pr_go" style="width:100%">Save review</button></div>`;
  }
  if(isShipping() && o.paymentStatus!=="awaiting_payment"){
    const fs=o.fulfilmentStatus; const acts=[];
    if(fs==="ready_to_pack") acts.push(["pack","Mark packed"]);
    if(fs==="ready_to_pack"||fs==="packed") acts.push(["collect","Mark collected"]);
    if(fs==="packed") acts.push(["dispatch","Dispatch…"]);
    if(fs==="dispatched") acts.push(["deliver","Mark delivered"]);
    if(fs!=="issue_hold"&&!["delivered","collected","cancelled"].includes(fs)) acts.push(["issue","Flag issue…"]);
    if(fs==="issue_hold") acts.push(["resolve","Resolve hold"]);
    if(acts.length) html+=`<div class="card"><h3 style="margin-bottom:12px">Fulfilment</h3>
      <div id="ship_extra"></div>
      <div style="display:flex;flex-direction:column;gap:8px">${acts.map(a=>`<button class="btn ghost" data-a="${a[0]}">${a[1]}</button>`).join("")}</div></div>`;
  }
  box.innerHTML=html||`<div class="card muted">No actions available for your role at this stage.</div>`;

  if($("pr_result")){
    const sync=()=>{ $("pr_partialwrap").style.display=$("pr_result").value==="partial_verified"?"block":"none"; };
    $("pr_result").onchange=sync; sync();
    $("pr_go").onclick=async()=>{
      const result=$("pr_result").value;
      const body={result,amountVerified:$("pr_amt").value,bankReference:$("pr_ref").value,releaseToShipping:true};
      if(result==="partial_verified") body.approvePartialRelease=$("pr_partial").checked;
      try{ const r=await api("/api/app/orders/"+id+"/payment-review",{method:"POST",body:JSON.stringify(body)});
        toast(r.released?"Reviewed & released to shipping":"Payment review saved"); openOrder(id);
      }catch(e){ toast(e.message==="partial_release_needs_approval"?"Tick the partial-release exception to release":"Could not save review",true); }
    };
  }
  box.querySelectorAll("[data-a]").forEach(b=>b.onclick=()=>shipAction(b.dataset.a,id));
}

async function shipAction(action,id){
  let body={action};
  if(action==="dispatch"){
    const courier=prompt("Courier?"); if(!courier) return;
    const tracking=prompt("Tracking number?"); if(!tracking) return;
    body.courier=courier; body.trackingNumber=tracking;
  }
  if(action==="deliver"||action==="collect"){ body.receivedBy=prompt("Received by (optional)")||undefined; }
  if(action==="issue"){ body.issueType=prompt("Issue type?")||"unspecified"; body.issueNotes=prompt("Notes?")||undefined; }
  try{ await api("/api/app/orders/"+id+"/fulfilment",{method:"POST",body:JSON.stringify(body)}); toast("Updated"); openOrder(id); }
  catch(e){ toast("Could not update: "+e.message,true); }
}

        <div class="field"><label>Login email (defaults to contact email)</label><input id="lemail"/></div>
        <button class="btn" id="save" style="width:100%">Create reseller</button>
        <div class="err" id="rerr"></div><div id="rok"></div></div>`;
    $("back").onclick=()=>viewResellers(M);
    $("save").onclick=async()=>{
      $("rerr").textContent="";
      const body={name:$("name").value.trim(),email:$("email").value.trim(),phone:$("phone").value.trim()||undefined,
        address:$("addr").value.trim()||undefined,loginEmail:$("lemail").value.trim()||undefined};
      try{ const r=await api("/api/app/resellers",{method:"POST",body:JSON.stringify(body)});
        $("rok").innerHTML=`<div class="ok" style="margin-top:12px">Reseller created. Send them this one-time setup link:</div>
          <div class="linkbox" style="margin-top:8px">${esc(r.setupLink)}</div>`;
        toast("Reseller created");
      }catch(e){ $("rerr").textContent="Could not create: "+e.message; }
    };
  }
  load();
}

boot();
</script>
</body>
</html>
